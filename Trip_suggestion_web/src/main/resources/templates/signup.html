<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>회원가입</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
                    linear-gradient(
                            180deg,
                            #eef5ff 0%,
                            #f8fafc 100%
                    );

            font-family:
                    "Pretendard",
                    "Noto Sans KR",
                    sans-serif;

        }

        .login-card{

            width:100%;

            max-width:500px;

            background:white;

            border-radius:32px;

            padding:50px;

            box-shadow:
                    0 20px 60px rgba(0,0,0,.08);

        }

        .logo{

            text-decoration:none;

            font-size:30px;

            font-weight:800;

            color:#2563eb;

        }

        .logo-wrap{

            text-align:center;

            margin-bottom:30px;

        }

        .login-title{

            font-size:36px;

            font-weight:900;

            margin-bottom:10px;

        }

        .login-sub{

            color:#64748b;

            margin-bottom:30px;

        }

        .form-label{

            font-weight:700;

            margin-bottom:8px;

        }

        .form-control{

            height:58px;

            border-radius:16px;

            border:2px solid #e2e8f0;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        .login-btn{

            width:100%;

            height:60px;

            border:none;

            border-radius:18px;

            font-size:18px;

            font-weight:700;

            color:white;

            background:
                    linear-gradient(
                            135deg,
                            #2563eb,
                            #60a5fa
                    );

            transition:.25s;

        }

        .login-btn:hover{

            transform:
                    translateY(-2px);

        }

        .signup-link{

            text-decoration:none;

            font-weight:700;

            color:#2563eb;

        }

        .error-box{

            background:#fef2f2;

            color:#dc2626;

            padding:12px;

            border-radius:12px;

            margin-bottom:15px;

            text-align:center;

        }

    </style>
    <link rel="stylesheet"
          href="/theme.css">
</head>

<body>

<div class="login-card">

    <div class="logo-wrap">

        <a href="/"
           class="logo">

            ✈️ TripMate AI

        </a>

    </div>

    <div class="text-center">

        <div class="login-title">

            회원가입

        </div>

        <div class="login-sub">

            TripMate AI와 함께 여행을 시작해보세요

        </div>

    </div>

    <div th:if="${error}"
         th:text="${error}"
         class="error-box">

    </div>

    <form action="/signup"
          method="post">

        <div class="mb-3">

            <label class="form-label">

                이름

            </label>

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="이름을 입력하세요"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                아이디

            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="아이디를 입력하세요"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label">

                비밀번호

            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="비밀번호를 입력하세요"
                   required>

        </div>

        <button type="submit"
                class="login-btn">

            회원가입

        </button>

    </form>

    <hr class="my-4">

    <div class="text-center">

        이미 계정이 있으신가요?

        <a href="/login"
           class="signup-link">

            로그인

        </a>

    </div>

</div>
<button id="themeToggle"
        class="theme-btn">

    🌙

</button>

<script src="/theme.js"></script>
</body>
</html>
